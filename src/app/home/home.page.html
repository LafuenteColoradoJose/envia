<ion-menu menuId="config-menu" side="end" contentId="main-content">
  <app-config-panel></app-config-panel>
</ion-menu>

<ion-content id="main-content" [fullscreen]="true">
  <ion-grid class="ion-no-padding" style="height: 100%;">
    <ion-row style="height: 100%;">
      
      <!-- Panel de configuración (solo en escritorio) -->
      @if (desktopPanelVisible) {
        <ion-col size="12" size-lg="3" class="desktop-panel">
          <app-config-panel [isDesktop]="true" (onCollapse)="desktopPanelVisible = false"></app-config-panel>
        </ion-col>
      }
      
      <!-- Panel principal con la lista de trenes -->
      <ion-col size="12" [sizeLg]="desktopPanelVisible ? '9' : '12'" class="main-panel">
        <app-board></app-board>
      </ion-col>
      
    </ion-row>
  </ion-grid>

  <!-- Botón flotante para abrir controles en móvil -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end" class="mobile-fab">
    <ion-menu-toggle menu="config-menu">
      <ion-fab-button color="primary" aria-label="Abrir panel de configuración">
        <ion-icon name="options-outline" aria-hidden="true"></ion-icon>
      </ion-fab-button>
    </ion-menu-toggle>
  </ion-fab>

  <!-- Botón flotante para restaurar controles en escritorio -->
  @if (!desktopPanelVisible) {
    <ion-fab slot="fixed" vertical="bottom" horizontal="start" class="desktop-fab" style="margin-left: 16px;">
      <ion-fab-button color="primary" (click)="desktopPanelVisible = true" title="Mostrar opciones" aria-label="Mostrar panel de opciones">
        <ion-icon name="options-outline" aria-hidden="true"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  }
</ion-content>
