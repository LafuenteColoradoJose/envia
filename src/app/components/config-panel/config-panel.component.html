<ion-content class="config-content">
  <div class="config-container">
    <div class="header-section">
      <div class="header-content">
        <div class="header-title">
          <ion-icon name="options-outline"></ion-icon>
          <h2>Configuración</h2>
        </div>
        <p class="header-subtitle">Personaliza tu panel de estación ADIF</p>
      </div>
      <ion-button (click)="closeModal()" fill="clear" class="close-btn" color="medium">
        <ion-icon name="close-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

    <!-- Station Selection -->
    <div class="config-card">
      <div class="card-header">
        <ion-icon name="train-outline"></ion-icon>
        <h3>Estación</h3>
      </div>
      <ion-searchbar mode="ios" (ionInput)="filterStations($event)" placeholder="Buscar estación..." class="custom-searchbar"></ion-searchbar>
      
      <div class="station-list-container">
        <ion-list class="station-list">
          <ion-item *ngFor="let s of filteredStations" (click)="changeStation(s.code)" button detail="false" [class.selected]="selectedStation === s.code" lines="none">
            <ion-label>
              <h2>{{ s.name || s.title }}</h2>
              <p *ngIf="s.location">{{ s.location.province }}</p>
            </ion-label>
            <ion-icon *ngIf="selectedStation === s.code" name="checkmark-circle" slot="end" color="primary"></ion-icon>
          </ion-item>
        </ion-list>
      </div>
    </div>

    <!-- Traffic Filters -->
    <div class="config-card">
      <div class="card-header">
        <ion-icon name="filter-outline"></ion-icon>
        <h3>Filtros de Tráfico</h3>
      </div>
      <div class="chip-container">
        <ion-chip *ngFor="let t of trafficTypes" (click)="toggleTraffic(t)" [ngClass]="t.active ? 'chip-active' : 'chip-inactive'" mode="ios" class="custom-chip">
          <ion-label>{{ t.label }}</ion-label>
        </ion-chip>
      </div>
    </div>

    <!-- Theme Selection -->
    <div class="config-card">
      <div class="card-header">
        <ion-icon name="color-palette-outline"></ion-icon>
        <h3>Tema Visual</h3>
      </div>
      <ion-segment [value]="currentTheme" (ionChange)="themeChanged($event)" color="primary" mode="ios" class="theme-segment">
        <ion-segment-button value="light">
          <ion-icon name="sunny-outline"></ion-icon>
          <ion-label>Claro</ion-label>
        </ion-segment-button>
        <ion-segment-button value="dark">
          <ion-icon name="moon-outline"></ion-icon>
          <ion-label>Oscuro</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>
  </div>
</ion-content>
