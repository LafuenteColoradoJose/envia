<ion-header mode="md" class="ion-no-border">
  <ion-toolbar>
    <ion-title style="font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; padding-inline: 24px;">
      <ion-icon name="options-outline" style="vertical-align: text-bottom; margin-right: 8px; color: var(--ion-color-primary);"></ion-icon>
      Configuración
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closeModal()" color="medium" style="margin-right: 16px;">
        <ion-icon name="close-circle" slot="icon-only" style="font-size: 1.8rem;"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="config-content">
  <div class="config-container">
    <!-- Traffic Filters -->
    <div class="config-card">
      <div class="card-header">
        <ion-icon name="filter-outline"></ion-icon>
        <h3>Filtros de Tráfico</h3>
      </div>
      <div class="chip-container">
        <ion-chip *ngFor="let t of trafficTypes" (click)="toggleTraffic(t)" [ngClass]="t.active ? 'chip-active' : 'chip-inactive'" mode="ios" class="custom-chip">
          <ion-label>{{ t.label }}</ion-label>
        </ion-chip>
      </div>
    </div>

    <!-- Theme Selection -->
    <div class="config-card">
      <div class="card-header">
        <ion-icon name="color-palette-outline"></ion-icon>
        <h3>Tema Visual</h3>
      </div>
      <ion-segment [value]="currentTheme" (ionChange)="themeChanged($event)" color="primary" mode="ios" class="theme-segment">
        <ion-segment-button value="light">
          <ion-icon name="sunny-outline"></ion-icon>
          <ion-label>Claro</ion-label>
        </ion-segment-button>
        <ion-segment-button value="dark">
          <ion-icon name="moon-outline"></ion-icon>
          <ion-label>Oscuro</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>

    <!-- Author Card -->
    <div class="config-card author-card">
      <div class="author-info">
        <h4>Sobre el autor</h4>
        <h2>Jose Lafuente</h2>
      </div>
      <div class="social-links">
        <ion-button fill="clear" href="https://www.joselafuente.dev" target="_blank" color="medium">
          <ion-icon name="globe-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button fill="clear" href="https://github.com/LafuenteColoradoJose" target="_blank" color="medium">
          <ion-icon name="logo-github" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button fill="clear" href="https://www.linkedin.com/in/joselafuentecolorado/" target="_blank" color="medium">
          <ion-icon name="logo-linkedin" slot="icon-only"></ion-icon>
        </ion-button>
      </div>
    </div>

    <!-- Legal Disclaimer -->
    <div class="legal-disclaimer">
      <p>
        <strong>Nota:</strong> Aplicación realizada por motivos de aprendizaje de Angular e Ionic, no tiene carácter comercial. Todos los nombres y datos mostrados pertenecen a ADIF y a sus respectivas compañías.
      </p>
    </div>
  </div>
</ion-content>
